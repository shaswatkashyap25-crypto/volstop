name: Scrape TG Channel

on:
  schedule:
    # 9:30 AM IST = 4:00 AM UTC
    - cron: '0 4 * * 1-5'
    # 12:00 PM IST = 6:30 AM UTC
    - cron: '30 6 * * 1-5'
    # 3:30 PM IST = 10:00 AM UTC
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install telethon
      
      - name: Scrape channel
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
        run: python tg_scraper.py
      
      - name: Commit updated files
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add tg_trades.csv tg_scraper_state.json
          git diff --staged --quiet || git commit -m "TG scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
