name: Fyers Daily Auth

on:
  schedule:
   - cron: '20 3 * * 1-5'
  workflow_dispatch:

jobs:
  auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyotp requests
      
      - name: Run Fyers auth
        env:
          FYERS_CLIENT_ID: ${{ secrets.FYERS_CLIENT_ID }}
          FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
          FYERS_APP_SECRET: ${{ secrets.FYERS_APP_SECRET }}
          FYERS_TOTP_SECRET: ${{ secrets.FYERS_TOTP_SECRET }}
          FYERS_PIN: ${{ secrets.FYERS_PIN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: python fyers_auth.py
